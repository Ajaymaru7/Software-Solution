<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Wix Logo Icon -->
  <g id="wix-icon">
    <!-- Blue circles and connections -->
    <circle cx="35" cy="30" r="12" fill="#0066FF"/>
    <circle cx="55" cy="20" r="10" fill="#0099FF"/>
    <circle cx="70" cy="35" r="10" fill="#0099FF"/>
    <circle cx="60" cy="50" r="12" fill="#0066FF"/>
    <circle cx="40" cy="55" r="10" fill="#0099FF"/>
    <circle cx="25" cy="45" r="10" fill="#0099FF"/>
    
    <!-- Connecting lines -->
    <line x1="35" y1="30" x2="55" y2="20" stroke="#0099FF" stroke-width="2"/>
    <line x1="55" y1="20" x2="70" y2="35" stroke="#0099FF" stroke-width="2"/>
    <line x1="70" y1="35" x2="60" y2="50" stroke="#0099FF" stroke-width="2"/>
    <line x1="60" y1="50" x2="40" y2="55" stroke="#0099FF" stroke-width="2"/>
    <line x1="40" y1="55" x2="25" y2="45" stroke="#0099FF" stroke-width="2"/>
    <line x1="25" y1="45" x2="35" y2="30" stroke="#0099FF" stroke-width="2"/>
  </g>
  
  <!-- Wix text -->
  <text x="100" y="50" font-size="48" font-weight="bold" fill="#0066FF" font-family="Arial, sans-serif">Wix</text>
  
  <!-- studioz text -->
  <text x="180" y="50" font-size="48" font-weight="600" fill="#1a1a1a" font-family="Arial, sans-serif">studioz</text>
</svg>
